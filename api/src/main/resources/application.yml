server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/localloom
    username: ${DB_USERNAME:localloom}
    password: ${DB_PASSWORD:localloom}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:gemma3:27b}
          temperature: 0.7
      embedding:
        options:
          model: ${OLLAMA_EMBED_MODEL:mxbai-embed-large}
    vectorstore:
      chroma:
        initialize-schema: true
        client:
          host: ${CHROMA_HOST:http://localhost}
          port: ${CHROMA_PORT:8000}

logging:
  config: classpath:log4j2-spring.xml

localloom:
  import:
    max-episodes: ${MAX_EPISODES:0}  # 0 = unlimited; set to N to cap episodes per source import
    parallel-episodes: ${LOCALLOOM_IMPORT_PARALLEL_EPISODES:4}  # concurrent episodes; increase when Ollama is off
  chat:
    system-prompt: >-
      You are LocalLoom, a helpful AI assistant for a personal knowledge base.
      Answer questions using the provided context. Be concise and helpful.
      Cite sources with the title and section or timestamp when relevant.
    rag-system-prompt: >-
      You are a helpful assistant. Answer the user's question based on the
      context provided below. Use the context to give a thorough, accurate
      answer. Cite your sources by mentioning the title and section.
      If the context is partially relevant, answer what you can from it.
      Only say you cannot answer if the context is completely unrelated
      to the question.
    top-k: 5
  sidecar:
    url: http://localhost:8100
  audio:
    dir: data/audio
  security:
    ssrf-allowed-hosts: []
  upload:
    dir: data/uploads
  connectors:
    media:
      enabled: true
    youtube:
      enabled: true
    file-upload:
      enabled: true
    web-page:
      enabled: true
    teams:
      enabled: false
    github:
      enabled: false
