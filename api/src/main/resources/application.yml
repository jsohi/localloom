server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/localloom
    username: ${DB_USERNAME:localloom}
    password: ${DB_PASSWORD:localloom}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama4:scout
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      chroma:
        url: http://localhost:8000

logging:
  config: classpath:log4j2-spring.xml

localloom:
  sidecar:
    url: http://localhost:8100
  audio:
    dir: data/audio
  connectors:
    podcast:
      enabled: true
    file-upload:
      enabled: true
    confluence:
      enabled: false
    teams:
      enabled: false
    github:
      enabled: false
