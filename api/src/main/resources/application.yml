server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/localloom
    username: ${DB_USERNAME:localloom}
    password: ${DB_PASSWORD:localloom}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama4:scout
          temperature: 0.7
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      chroma:
        url: http://localhost:8000

logging:
  config: classpath:log4j2-spring.xml

localloom:
  chat:
    system-prompt: >-
      You are LocalLoom, a helpful assistant that answers questions about the
      user's knowledge base. Use the provided context to answer accurately.
      Always cite your sources with the source title and timestamp or section.
      If you don't have enough context to answer, say so.
  sidecar:
    url: http://localhost:8100
  audio:
    dir: data/audio
  connectors:
    podcast:
      enabled: true
    file-upload:
      enabled: true
    confluence:
      enabled: false
    teams:
      enabled: false
    github:
      enabled: false
