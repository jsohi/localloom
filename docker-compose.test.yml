services:
  api:
    environment:
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: ${E2E_OLLAMA_MODEL:-llama3.1:8b}
      LOCALLOOM_SECURITY_SSRF_ALLOWED_HOSTS: test-fixtures
    ports:
      - "18080:8080"
    volumes:
      - ./test-fixtures/yt-dlp-stub.sh:/usr/local/bin/yt-dlp:ro
      - ./test-fixtures/test-episode.wav:/usr/share/nginx/html/test-episode.wav:ro
      - ./test-fixtures/youtube-metadata.json:/usr/share/nginx/html/youtube-metadata.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/models/llm/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  postgres:
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localloom}"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s

  chromadb:
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000 && echo -e \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

  ml-sidecar:
    ports:
      - "18100:8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s

  frontend:
    ports:
      - "13000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 10s

  test-fixtures:
    image: nginx:alpine
    volumes:
      - ./test-fixtures/rss-feed.xml:/usr/share/nginx/html/rss-feed.xml:ro
      - ./test-fixtures/test-episode.wav:/usr/share/nginx/html/test-episode.wav:ro
      - ./test-fixtures/test-page.html:/usr/share/nginx/html/test-page.html:ro
      - ./test-fixtures/youtube-metadata.json:/usr/share/nginx/html/youtube-metadata.json:ro
      - ./test-fixtures/test-upload.txt:/usr/share/nginx/html/test-upload.txt:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/rss-feed.xml"]
      interval: 3s
      timeout: 2s
      retries: 3
      start_period: 3s
