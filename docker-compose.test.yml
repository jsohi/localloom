services:
  api:
    environment:
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: ${E2E_OLLAMA_MODEL:-llama3.1:8b}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/models/llm/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  postgres:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localloom}"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s

  chromadb:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  ml-sidecar:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s

  frontend:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 10s
