services:
  api:
    environment:
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: ${E2E_OLLAMA_MODEL:-llama3.1:8b}
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  postgres:
    healthcheck:
      interval: 3s
      retries: 5
      start_period: 3s

  chromadb:
    healthcheck:
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  ml-sidecar:
    healthcheck:
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s

  frontend:
    healthcheck:
      interval: 5s
      timeout: 2s
      retries: 5
