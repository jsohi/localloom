services:
  api:
    environment:
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: ${E2E_OLLAMA_MODEL:-llama3.1:8b}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/models/llm/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  postgres:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localloom}"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s

  chromadb:
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000 && echo -e \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

  ml-sidecar:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 15s

  frontend:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 10s

  test-fixtures:
    image: nginx:alpine
    volumes:
      - ./test-fixtures/rss-feed.xml:/usr/share/nginx/html/rss-feed.xml:ro
      - ./test-fixtures/test-episode.wav:/usr/share/nginx/html/test-episode.wav:ro
      - ./test-fixtures/test-page.html:/usr/share/nginx/html/test-page.html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/rss-feed.xml"]
      interval: 3s
      timeout: 2s
      retries: 3
      start_period: 3s
