x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-localloom}
      POSTGRES_USER: ${POSTGRES_USER:-localloom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localloom}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localloom}"]
      interval: 5s
      retries: 5
      start_period: 5s

  chromadb:
    image: chromadb/chroma:1.0.12
    restart: unless-stopped
    <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000 && echo -e \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    build: ./api
    image: localloom/api:${VERSION:-latest}
    restart: unless-stopped
    <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      ml-sidecar:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-localloom}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-localloom}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-localloom}
      # Ollama runs natively outside Docker for GPU access.
      # Mac: host.docker.internal works out of the box.
      # Linux: use 172.17.0.1 or add --add-host=host.docker.internal:host-gateway
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_HOST: http://chromadb
      CHROMA_PORT: "8000"
      LOCALLOOM_SIDECAR_URL: http://ml-sidecar:8100
      LOCALLOOM_AUDIO_DIR: /app/data/audio
      LOCALLOOM_AUDIO_SKIP_DEPENDENCY_CHECK: "true"
      LOG_DIR: /app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - audio-data:/app/data/audio
      - localloom-logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/models/llm/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ml-sidecar:
    build: ./ml-sidecar
    image: localloom/ml-sidecar:${VERSION:-latest}
    restart: unless-stopped
    <<: *default-logging
    environment:
      LOCALLOOM_MODEL_DIR: /app/data/models
      LOCALLOOM_TTS_OUTPUT_DIR: /app/data/tts_output
      SIDECAR_WORKERS: ${LOCALLOOM_SIDECAR_WORKERS:-8}  # max concurrent Whisper processes
      PYTHONUNBUFFERED: "1"
      LOG_DIR: /app/logs
    volumes:
      - models-data:/app/data/models
      - tts-data:/app/data/tts_output
      - localloom-logs:/app/logs
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://api:8080
    image: localloom/frontend:${VERSION:-latest}
    restart: unless-stopped
    <<: *default-logging
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8080
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    <<: *default-logging
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    <<: *default-logging
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-localloom}
      GF_SECURITY_ADMIN_USER: admin
    profiles:
      - monitoring

volumes:
  postgres-data:
  chroma-data:
  audio-data:
  models-data:
  tts-data:
  localloom-logs:
  prometheus-data:
  grafana-data:
