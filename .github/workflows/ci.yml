name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  api:
    name: API — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - name: Format check (Spotless)
        run: ./gradlew spotlessCheck

      - name: Compile
        run: ./gradlew compileJava

      - name: Test
        run: ./gradlew test

      - name: Generate coverage report
        if: always()
        run: ./gradlew jacocoTestReport

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: api/build/reports/tests/

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-reports
          path: |
            api/build/reports/jacoco/
            api/build/reports/jacoco/test/jacocoTestReport.xml

  ml-sidecar:
    name: ML Sidecar — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Check ml-sidecar exists
        id: check
        run: test -f pyproject.toml
        continue-on-error: true

      - uses: astral-sh/setup-uv@v4
        if: steps.check.outcome == 'success'

      - uses: actions/setup-python@v5
        if: steps.check.outcome == 'success'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outcome == 'success'
        run: uv sync --extra dev --extra test

      - name: Lint
        if: steps.check.outcome == 'success'
        run: uv run ruff check .

      - name: Format check
        if: steps.check.outcome == 'success'
        run: uv run ruff format --check .

      - name: Test
        if: steps.check.outcome == 'success'
        run: uv run pytest --ignore=tests/ml || [ $? -eq 5 ]

  frontend:
    name: Frontend — Lint, Type-check, Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run
