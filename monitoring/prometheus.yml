global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: localloom-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: api

  - job_name: localloom-sidecar
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8100']
        labels:
          service: sidecar
